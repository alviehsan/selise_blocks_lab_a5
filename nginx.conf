server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    add_header content-type text/plain;
    return 200 "ok\n";
  }

  location = /workflow-health.json {
    add_header content-type application/json;
    return 200 '{"ok":true,"service":"selise_blocks_lab_a5","workflowReady":true}\n';
  }
}
