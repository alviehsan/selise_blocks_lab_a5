server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /healthz {
    add_header content-type text/plain;
    return 200 "ok\n";
  }

  location = /workflow-health.json {
    add_header content-type application/json;
    return 200 '{"ok":true,"service":"selise_blocks_lab_a5","workflowReady":true}\n';
  }

  location = /scenario-status.json {
    add_header content-type application/json;
    return 200 '{"ok":true,"scenarioId":"ai-workflow","scenarioName":"Blocks AI Workflow Brief","complexity":3,"blocksServices":["AI Agent","Knowledge Base","Tool","Workflow","Email","Notification"],"acceptanceChecks":["Agent can answer from the lab knowledge folder","Tool action can call the hosted health endpoint","Workflow webhook completes with HTTP Request output","Email and notification are configured but only sent with explicit approval"],"workflowPlan":"Agent summarizes report-readiness signals, calls the health tool, then a workflow routes approval status to email and notification utilities.","gdprNotes":"Sensitive credentials are excluded from the report draft; recipient actions require explicit approval."}\n';
  }

  location = /gdpr-report.json {
    add_header content-type application/json;
    return 200 '{"ok":true,"policy":"owner-scoped-access","lawfulBasis":"legitimate-interest-for-operational-testing","dataMinimization":"store report metadata only","retention":"dispose lab data after explicit cleanup approval","rights":"support access, correction, export, and deletion workflows before production use"}\n';
  }

  location = /agent-snapshot.json {
    add_header content-type application/json;
    return 200 '{"ok":true,"service":"selise_blocks_lab_a5","agentCount":4,"tools":["Blocks Public Ping Tool","Blocks Lab Health Tool"],"workflowCount":10,"kbFolders":["Blocks Lab Notes","Blocks Lab Reports"],"scenarioId":"ai-workflow","complexity":3,"capturedFromApi":true}\n';
  }
}
